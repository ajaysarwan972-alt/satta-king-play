<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  text-align:center;
  padding:20px;
}

.box{
  background:#fff;
  padding:15px;
  margin:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
  padding:10px 20px;
  border:none;
  background:#16a34a;
  color:#fff;
  border-radius:5px;
  margin-top:10px;
}

h2{color:#111;}
</style>

</head>
<body>

<h2>Referral System</h2>

<div class="box">
  <p>Your Referral Code:</p>
  <h3 id="refCode">Loading...</h3>
  <button onclick="copyCode()">Copy Code</button>
</div>

<div class="box">
  <p>Total Commission:</p>
  <h3 id="totalCommission">0</h3>
</div>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// 🔹 user local storage se
const user = JSON.parse(localStorage.getItem("user"));

async function loadData(){

  // ✅ REF CODE (login table se)
  const { data: userData } = await supabase
    .from("login")
    .select("ref_code")
    .eq("id", user.id)
    .single();

  document.getElementById("refCode").innerText = userData.ref_code || "Not Set";

  // ✅ COMMISSION TOTAL (history table se)
  const { data: comData } = await supabase
    .from("history")
    .select("commission")
    .eq("user_id", user.id);

  let total = 0;

  comData.forEach(item => {
    if(item.commission){
      total += Number(item.commission);
    }
  });

  document.getElementById("totalCommission").innerText = total;
}

// 🔹 copy button
function copyCode(){
  const code = document.getElementById("refCode").innerText;
  navigator.clipboard.writeText(code);
  alert("Code Copied!");
}

loadData();
</script>

</body>
</html>
