<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My History</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f1f1;
}

.header{
  background:#000;
  color:#fff;
  padding:12px;
  text-align:center;
  font-size:18px;
}

.container{
  padding:10px;
}

.card{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border-left:5px solid green;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.market{
  color:blue;
}

.total{
  color:red;
}

.data{
  margin-top:8px;
  font-size:14px;
  color:#333;
  word-break:break-all;
}

.date{
  font-size:12px;
  color:#888;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">My History</div>

<div class="container" id="history"></div>

<script>
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location = "login.html";
}

// 📊 LOAD HISTORY
async function loadHistory(){

  const { data, error } = await client
  .from("history")
  .select("*")
  .eq("user_id", user.id)
  .order("id", { ascending: false });

  let html = "";

  if(!data || data.length === 0){
    html = "<p style='text-align:center;'>No History Found</p>";
  }else{

    data.forEach(item => {

      let numbers = item.data.map(d => `${d.number}(${d.amount})`).join(", ");

      html += `
      <div class="card">
        <div class="top">
          <div class="market">${item.market}</div>
          <div class="total">₹ ${item.total}</div>
        </div>

        <div class="data">${numbers}</div>

        <div class="date">
          ${new Date(item.created_at).toLocaleString()}
        </div>
      </div>
      `;
    });

  }

  document.getElementById("history").innerHTML = html;
}

loadHistory();
</script>

</body>
</html>
