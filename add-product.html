<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Add Product</h2>

<input id="name" placeholder="Name"><br>
<input id="price" type="number" placeholder="Price"><br>
<input id="imageFile" type="file"><br>
<input id="size" placeholder="Size (L,XL or M or FREE)"><br>
<textarea id="desc" placeholder="Description"></textarea><br>

<button onclick="addProduct()">Add</button>

<script>
const { createClient } = supabase;

const db = createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

async function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let file = document.getElementById("imageFile").files[0];
let size = document.getElementById("size").value;
let desc = document.getElementById("desc").value;

if(!name || !price || !file || !size){
alert("Sab fill kar");
return;
}

// 🔥 size fix
size = size.replace(/\s+/g,"").toUpperCase();

let fileName = Date.now()+"-"+file.name;

// upload
const { error: uploadError } = await db.storage
.from("products")
.upload(fileName, file);

if(uploadError){
alert("upload fail");
return;
}

// url
let { data } = db.storage.from("products").getPublicUrl(fileName);

// insert
await db.from("products").insert([{
name:name,
price:price,
image:data.publicUrl,
size:size,
description:desc
}]);

alert("Added");

}
</script>

</body>
</html>
