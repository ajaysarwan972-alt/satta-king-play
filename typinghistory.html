<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9;}

.header{
display:flex;justify-content:space-between;
padding:10px;background:#fff;
}

.card{
background:#fff;
margin:10px;
padding:12px;
border-radius:10px;
}

img{
width:100%;
height:auto;
border-radius:10px;
margin-top:10px;
}

.text{
white-space:pre-wrap;
background:#f1f5f9;
padding:8px;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
</div>

<div id="historyBox"></div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));

// 🔥 LOAD HISTORY
async function loadHistory(){

let {data, error} = await client
.from("typing_image")
.select("*")
.eq("user_id", user.id)
.order("id",{ascending:false});

if(error){
alert("Error loading data");
console.log(error);
return;
}

document.getElementById("userId").innerText="ID: "+user.id;

let html="";

data.forEach(item=>{

let date = item.created_at 
? new Date(item.created_at).toLocaleString() 
: "N/A";

html+=`
<div class="card">

<div><b>${item.market}</b></div>

<div style="font-size:12px;color:gray;margin-top:5px;">
${date}
</div>

${
item.data && item.data.includes("http")
? `<img src="${item.data}">`
: `<div class="text">${item.data || ""}</div>`
}

<div style="margin-top:10px;font-weight:bold;color:green;">
Total: ₹ ${item.total}
</div>

</div>
`;

});

document.getElementById("historyBox").innerHTML=html;
}

loadHistory();

</script>

</body>
</html>
