<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Lottery</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f1f1;}

.header{background:#000;color:#fff;padding:10px;text-align:center;}
.wallet{background:#fff;padding:10px;text-align:center;font-weight:bold;}

.table{width:100%;border-collapse:collapse;background:#fff;}
.table th{color:blue;padding:10px;border:1px solid #ddd;}
.table td{text-align:center;padding:12px;border:1px solid #ddd;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
Select Date: <input type="date">
</div>

<div class="wallet">
Wallet: ₹ <span id="balance">0</span>
</div>

<table class="table">
<tr>
<th>DrawTime</th>
<th>SANGAM</th>
<th>CHETAK</th>
<th>SUPER</th>
</tr>

<tbody id="data"></tbody>
</table>

<script>
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));

// ✅ USER + WALLET
async function loadUser(){
  if(!user){
    window.location="login.html";
    return;
  }

  let {data} = await client
  .from("login")
  .select("balance")
  .eq("id", user.id)
  .single();

  if(data){
    document.getElementById("balance").innerText = data.balance;
  }
}
loadUser();

// ✅ RUNNING CHECK
function checkRunning(time){
  let now = new Date();

  let [h,m] = time.split(":");
  let gameTime = new Date();
  gameTime.setHours(h, m, 0);

  let closeTime = new Date(gameTime.getTime() + 15*60000);

  return now >= gameTime && now <= closeTime;
}

// ✅ LOAD DATA
async function loadData(){
  const { data } = await client
  .from("india_result")
  .select("*")
  .order("id", { ascending: false });

  let unique = {};

  data.forEach(row => {
    if(!unique[row.time]){
      unique[row.time] = row;
    }
  });

  let html = "";

  Object.values(unique).forEach(row => {

    let isOpen = checkRunning(row.time);

    html += `
    <tr 
      style="${!isOpen ? 'opacity:0.5' : ''}"
      ${isOpen ? `onclick="openGame('${row.time}')"` : ''}
    >
      <td>${row.time}</td>
      <td>${row.sangam || '--'}</td>
      <td>${row.chetak || '--'}</td>
      <td>${row.super || '--'}</td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

loadData();

// ✅ OPEN GAME
function openGame(time){
  localStorage.setItem("time", time);
  localStorage.setItem("market","INDIA");
  window.location.href="game.html";
}
</script>

</body>
</html>
