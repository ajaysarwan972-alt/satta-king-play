<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhola Shop</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:url("https://i.ibb.co/7QpKsCX/shiv.jpg") no-repeat center center/cover;
}
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}
.header{
  background:#ff3f6c;
  color:#fff;
  padding:15px;
  text-align:center;
}
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
.card{
  background:#ffffffdd;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}
button{
  background:#ff3f6c;
  color:#fff;
  border:none;
  padding:8px;
  margin-top:5px;
  border-radius:5px;
  width:100%;
}
</style>
</head>

<body>

<div class="header">
  <h2>🛒 Bhola Shop</h2>
  <p>Best Deals | Cash on Delivery 🚚</p>
</div>

<div class="products" id="products"></div>

<script>

// ✅ FIXED SUPABASE CLIENT
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 LOAD PRODUCTS
async function loadProducts(){

const { data, error } = await supabaseClient
  .from("products")
  .select("*")
  .order("id", { ascending: false });

if(error){
  alert("Error loading products");
  console.log(error);
  return;
}

if(!data || data.length === 0){
  document.getElementById("products").innerHTML = "<h3 style='color:white'>No Products Found</h3>";
  return;
}

let html = "";

data.forEach(p=>{
html += `
<div class="card">
  <img src="${p.image}">
  <h3>${p.name}</h3>
  <h4>₹${p.price}</h4>
  <button onclick='buy(${JSON.stringify(p)})'>Order</button>
</div>`;
});

document.getElementById("products").innerHTML = html;

}

// 🔥 LOAD CALL
loadProducts();

// 🔥 ORDER PAGE
function buy(p){
localStorage.setItem("product", JSON.stringify(p));
window.location.href = "order.html";
}

</script>

</body>
</html>
