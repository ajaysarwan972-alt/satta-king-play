<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

#userId{
  position:fixed;
  left:15px;
  top:15px;
  background:green;
  color:white;
  padding:8px 18px;
  border-radius:20px;
  font-weight:bold;
}

#wallet{
  position:fixed;
  right:15px;
  top:15px;
  background:red;
  color:white;
  padding:8px 18px;
  border-radius:20px;
  font-weight:bold;
}

.box{
  margin-top:80px;
  padding:20px;
}

.codeBox{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
  margin-top:10px;
}

.share{background:green;}
.copy{background:red;}

.list{
  margin-top:20px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.item{
  border-bottom:1px solid #ddd;
  padding:10px 0;
}
</style>

</head>

<body>

<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>

<div class="box">

  <div class="codeBox" id="refCode">CODE</div>

  <button class="btn share" onclick="shareApp()">SHARE APP</button>
  <button class="btn copy" onclick="copyCode()">COPY CODE</button>

  <div class="list" id="list">
    <b>My Referrals:</b>
  </div>

</div>

<script>

// USER CHECK
const user = JSON.parse(localStorage.getItem("user"));
if(!user){
  window.location.href = "index.html";
}

// SUPABASE
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// LOAD WALLET
async function loadWallet(){
  let { data, error } = await client
  .from("login")
  .select("balance")
  .eq("id", user.id)
  .single();

  if(data){
    document.getElementById("wallet").innerText = "₹ " + data.balance;
    document.getElementById("userId").innerText = "ID: " + user.id;
  }
}

// SHOW CODE
document.getElementById("refCode").innerText = user.id;

// 🔥 FIXED SHARE FUNCTION
function shareApp(){

  let link = "https://badshaapp.netlify.app/signup.html?ref=" + user.id;

  let text = "Join this app using my referral link 👇\n" + link;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));

}

// COPY
function copyCode(){
  navigator.clipboard.writeText(user.id);
  alert("Copied ✅");
}

// LOAD REFERRALS
async function loadRef(){

  let { data, error } = await client
  .from("login")
  .select("name, id, created_at")
  .eq("ref_by", user.id);

  let list = document.getElementById("list");

  if(data && data.length > 0){
    data.forEach(d => {
      let div = document.createElement("div");
      div.className = "item";
      div.innerText = d.name + " (" + d.id + ")";
      list.appendChild(div);
    });
  }else{
    list.innerHTML += "<p>No referrals yet</p>";
  }

}

// LOAD
loadWallet();
loadRef();

</script>

</body>
</html>
