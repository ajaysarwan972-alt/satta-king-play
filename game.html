<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Games</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#e5e7eb;padding-bottom:80px;}
.header{position:fixed;top:10px;left:10px;right:10px;background:#fff;padding:10px;border-radius:20px;display:flex;justify-content:space-between;}
#userId{background:green;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}
#wallet{background:red;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}
.topBtns{margin-top:80px;display:flex;justify-content:space-around;}
.topBtn{width:18%;padding:10px;border-radius:20px;color:#fff;text-align:center;font-size:12px;cursor:pointer;}
.btn1{background:#6c5ce7;} .btn2{background:#00b894;} .btn3{background:#0984e3;} .btn4{background:#e17055;} .btn5{background:#111;}
.game{display:none;} .active{display:block;}
.container{margin:10px;background:#fff;padding:15px;border-radius:15px;padding-bottom:150px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.box{background:#fff;padding:10px;border-radius:10px;text-align:center;border:1px solid #ddd;}
input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;}
.bottom{position:fixed;bottom:0;width:100%;display:flex;}
.total{width:50%;background:linear-gradient(to right,blue,red);color:#fff;text-align:center;padding:15px;}
.submit{width:50%;background:green;color:#fff;text-align:center;padding:15px;font-weight:bold;cursor:pointer;}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>
</div>

<div class="topBtns">
<div class="topBtn btn1" onclick="showGame('jodi')">JODI</div>
<div class="topBtn btn2" onclick="showGame('haruf')">HARUF</div>
<div class="topBtn btn3" onclick="showGame('crossing')">CROSSING</div>
<div class="topBtn btn4" onclick="showGame('copy')">COPY</div>
<div class="topBtn btn5" onclick="window.location.href='play.html'">TYP/IMAGE</div>
</div>

<!-- JODI -->
<div id="jodi" class="game active container">
<div class="grid" id="jodiGrid"></div>
</div>

<!-- HARUF -->
<div id="haruf" class="game container">
<h3>Single Andar</h3>
<div class="grid" id="harufGrid1"></div>
<h3>Single Bahar</h3>
<div class="grid" id="harufGrid2"></div>
</div>

<!-- CROSSING -->
<div id="crossing" class="game container">
<label>1ST NUMBER</label>
<input id="num1" type="tel" inputmode="numeric" oninput="onlyNumber(this)">
<label>2ND NUMBER</label>
<input id="num2" type="tel" inputmode="numeric" oninput="onlyNumber(this)">
<label>POINTS</label>
<input id="points" type="tel" inputmode="numeric" oninput="onlyNumber(this)">
<button onclick="generateCross()">SET</button>

<div id="crossGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;"></div>
</div>

<!-- COPY -->
<div id="copy" class="game container">
<label>ENTER DIGIT</label>
<input id="digits" type="tel" inputmode="numeric" oninput="onlyNumber(this)">
<label>ENTER AMOUNT</label>
<input id="amt" type="tel" inputmode="numeric" oninput="onlyNumber(this)">
<button onclick="generateCopy()">ADD</button>

<table id="table" border="1" width="100%">
<tr><th>NUMBER</th><th>AMOUNT</th></tr>
</table>
</div>

<div class="bottom">
<div class="total" id="total">₹ 0</div>
<div class="submit" onclick="submitAll()">SUBMIT</div>
</div>

<script>

// 🔥 NUMBER ONLY FUNCTION
function onlyNumber(input){
  input.value = input.value.replace(/[^0-9]/g,'');
}

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));
if(!user){
alert("Login first");
window.location.href="login.html";
}
document.getElementById("userId").innerText = "ID: " + user.id;

async function loadWallet(){
let {data} = await client.from("login").select("balance").eq("id", user.id).single();
if(data){
document.getElementById("wallet").innerText = "₹ " + data.balance;
}}
loadWallet();

const market = localStorage.getItem("market") || "UNKNOWN";

let dataArr = [];
let total = 0;

function updateTotal(){
total = 0;
dataArr.forEach(i=>total+=i.amount);
document.getElementById("total").innerText="₹ "+total;
}

function showGame(id){
document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// JODI
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
jodiGrid.innerHTML+=`<div class="box">${num}
<input type="tel" inputmode="numeric" oninput="onlyNumber(this); add('${num}',this.value)">
</div>`;
}

// HARUF
for(let i=0;i<10;i++){
harufGrid1.innerHTML+=`<div class="box">${i}
<input type="tel" inputmode="numeric" oninput="onlyNumber(this); add('A${i}',this.value)">
</div>`;

harufGrid2.innerHTML+=`<div class="box">${i}
<input type="tel" inputmode="numeric" oninput="onlyNumber(this); add('B${i}',this.value)">
</div>`;
}

function add(num,val){
val=Number(val)||0;
dataArr=dataArr.filter(x=>x.number!==num);
if(val>0){dataArr.push({number:num,amount:val});}
updateTotal();
}

// CROSS
function generateCross(){
let n1=num1.value.trim();
let n2=num2.value.trim();
let a=Number(points.value)||0;

crossGrid.innerHTML="";

for(let i of n1){
for(let j of n2){
let num=i+j;

dataArr = dataArr.filter(x=>x.number!==num);
dataArr.push({number:num,amount:a});

crossGrid.innerHTML += `<div class="box">${num}<br>₹${a}</div>`;
}}

updateTotal();
}

// COPY
function generateCopy(){
let d=digits.value.trim();
let a=Number(amt.value)||0;

let arr=d.match(/.{1,2}/g)||[];

table.innerHTML=`<tr><th>NUMBER</th><th>AMOUNT</th></tr>`;

arr.forEach(num=>{
if(num.length==1) num="0"+num;

dataArr = dataArr.filter(x=>x.number!==num);
dataArr.push({number:num,amount:a});

table.innerHTML += `<tr><td>${num}</td><td>${a}</td></tr>`;
});

updateTotal();
}

// SUBMIT
async function submitAll(){

if(dataArr.length===0){
alert("Kuch add karo pehle");
return;
}

let {data:userData} = await client.from("login").select("balance").eq("id", user.id).single();

if(userData.balance < total){
alert("LOW BALANCE");
return;
}

await client.from("login").update({balance: userData.balance - total}).eq("id", user.id);

await client.from("history").insert([{
user_id:user.id,
market:market,
data:dataArr,
total:total,
created_at:new Date().toISOString()
}]);

alert("GAME OK");

loadWallet();

dataArr=[];
total=0;
updateTotal();
document.querySelectorAll("input").forEach(i=>i.value="");
crossGrid.innerHTML="";
table.innerHTML=`<tr><th>NUMBER</th><th>AMOUNT</th></tr>`;
}

</script>

</body>
</html>
