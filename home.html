<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

#menuBtn{
  position:fixed;
  left:15px;
  top:20px;
  font-size:22px;
  z-index:999;
  cursor:pointer;
}

#userId{
  position:fixed;
  left:60px;
  top:15px;
  background:green;
  color:white;
  padding:8px 18px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
}

#wallet{
  position:fixed;
  right:15px;
  top:15px;
  background:red;
  color:white;
  padding:8px 18px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
  cursor:pointer;
}

.actionBar{
  margin-top:90px;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.actionBtn{
  width:30%;
  padding:12px;
  border-radius:25px;
  text-align:center;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.add{background:green;}
.withdraw{background:#ff4d4d;}
.share{background:#6c5ce7;}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:10px;
  padding:10px;
  gap:12px;
}

.btn{
  width:calc(50% - 10px);
  background:#fff;
  border:3px solid green;
  border-radius:20px;
  padding:15px;
  box-sizing:border-box;
  text-align:center;
}

.gameName{
  font-size:18px;
  font-weight:bold;
}

.gameNumber{
  font-size:26px;
  color:red;
  font-weight:bold;
  margin:5px 0;
}

.gameTime{
  font-size:14px;
  color:#1e73be;
  margin-bottom:10px;
}

.status img{
  width:70px;
  margin-top:10px;
}

.whatsapp{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:28px;
}

#bottomNav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:60px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.navBtn{
  width:22%;
  height:40px;
  background:#eee;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.active{
  background:green;
  color:white;
}
</style>
</head>

<body>

<div id="menuBtn" onclick="openMenu()">☰</div>
<div id="userId">ID: 0000</div>

<div id="wallet" onclick="goWallet()">₹ 0</div>

<div class="actionBar">
  <div class="actionBtn add" onclick="go('deposit.html')">Add Money</div>
  <div class="actionBtn withdraw" onclick="go('withdraw.html')">Withdraw</div>
  <div class="actionBtn share" onclick="shareApp()">Share</div>
</div>

<div class="container" id="container"></div>

<a class="whatsapp" href="https://api.whatsapp.com/send?phone=919053922906" target="_blank">💬</a>

<!-- 🔥 UPDATED NAV ONLY -->
<div id="bottomNav">
  <div class="navBtn active" onclick="go('home.html')">Home</div>
  <div class="navBtn" onclick="go('india.html')">PLAY INDIA</div>
  <div class="navBtn" onclick="goWallet()">Wallet</div>
  <div class="navBtn" onclick="go('profile.html')">Profile</div>
</div>

<script src="menu.js"></script>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "index.html";
}

const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

async function loadWallet(){
  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  if(data){
    document.getElementById("wallet").innerText = "₹ " + data.balance;
    document.getElementById("userId").innerText = "ID: " + user.id;
  }
}

function checkStatus(openTime, closeTime){
  if(!openTime || !closeTime) return false;

  let now = new Date();

  const [oh, om] = openTime.split(":");
  const [ch, cm] = closeTime.split(":");

  let open = new Date();
  open.setHours(oh, om, 0);

  let close = new Date();
  close.setHours(ch, cm, 0);

  if(close < open){
    close.setDate(close.getDate() + 1);
    if(now < open){
      now.setDate(now.getDate() + 1);
    }
  }

  return (now >= open && now <= close);
}

async function loadButtons(){

  let { data } = await client
  .from("Game result")
  .select("name, number, open, close");

  data.sort((a, b) => {
    return checkStatus(b.open, b.close) - checkStatus(a.open, a.close);
  });

  let container = document.getElementById("container");
  container.innerHTML = "";

  data.forEach(item => {

    let isOpen = checkStatus(item.open, item.close);

    let btn = document.createElement("div");
    btn.className = "btn";

    btn.innerHTML = `
      <div class="gameName">${item.name}</div>
      <div class="gameNumber">${item.number || '**'}</div>
      <div class="gameTime">${item.open} - ${item.close}</div>
      <div class="status">
        <img src="${isOpen 
          ? 'https://cdn-icons-png.flaticon.com/512/190/190411.png' 
          : 'https://cdn-icons-png.flaticon.com/512/463/463612.png'}">
      </div>
    `;

    if(isOpen){
      btn.onclick = () => {
        localStorage.setItem("market", item.name);
        window.location.href = "game.html";
      };
    } else {
      btn.style.opacity = "0.6";
    }

    container.appendChild(btn);
  });
}

function go(page){
  window.location.href = page;
}

/* 🔥 ONLY SHARE LINK UPDATED */
function shareApp(){
  navigator.share({
    title: "My App",
    text: "Join now",
    url: window.location.origin + "/referral.html"
  });
}

function goWallet(){
  window.location.href = "wallet.html";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

loadWallet();
loadButtons();

setInterval(()=>{
  loadButtons();
  loadWallet();
},60000);
</script>

</body>
</html>
